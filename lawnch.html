<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Launch Experience</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#020617;
color:white;
overflow:hidden;
text-align:center;
}

/* background stars */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:.2;
animation:moveStars 40s linear infinite;
}

@keyframes moveStars{
from{transform:translateY(0)}
to{transform:translateY(-1000px)}
}

/* content */

.container{
position:relative;
z-index:2;
}

.logo{
width:200px;
margin-bottom:25px;
}

button{
padding:16px 45px;
font-size:18px;
border:none;
border-radius:40px;
background:#06b6d4;
color:white;
cursor:pointer;
}

/* countdown */

#countdown{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:120px;
opacity:0;
visibility:hidden;
}

#countdown.show{
opacity:1;
visibility:visible;
}

/* portal */

.portal{
position:fixed;
top:50%;
left:50%;
width:50px;
height:50px;
border-radius:50%;
transform:translate(-50%,-50%);
background:radial-gradient(circle,#00eaff,#001f3f);
box-shadow:0 0 40px #00eaff,0 0 100px #00eaff;
opacity:0;
z-index:5;
}

.portal.open{
opacity:1;
animation:portalGrow 2.5s forwards;
}

@keyframes portalGrow{

0%{
width:50px;
height:50px;
}

100%{
width:3000px;
height:3000px;
}

}

</style>
</head>

<body>

<div class="container">

<img src="assets/logo-transparent.png" class="logo">

<h1>Enter the Experience</h1>

<br>

<button onclick="startLaunch()">Enter Website 🚀</button>

</div>

<div id="countdown">10</div>

<div class="portal" id="portal"></div>

<script>

function startLaunch(){

let num=10
let counter=document.getElementById("countdown")

counter.classList.add("show")

let timer=setInterval(function(){

counter.innerHTML=num
num--

if(num<0){

clearInterval(timer)

counter.style.display="none"

document.getElementById("portal").classList.add("open")

setTimeout(function(){

window.location.href="https://yourwebsite.com"

},2000)

}

},1000)

}

</script>

</body>
</html>
